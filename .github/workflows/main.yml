name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Get Version
      id: get_version
      shell: bash
      run: |
        # Extract version from pyproject.toml
        if [ -f pyproject.toml ]; then
          VERSION=$(grep -m1 'version = ' pyproject.toml | cut -d '"' -f 2)
        else
          VERSION="0.0.0"
        fi
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Detected version: $VERSION"
    
    - name: Install system dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libxcb-xinerama0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
          libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxkbcommon-x11-0 \
          libxcb-cursor0 libxcb1 x11-utils \
          ruby ruby-dev rubygems build-essential
        sudo gem install --no-document fpm
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[all]
        pip install pyinstaller
    
    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --onefile --windowed --noconfirm `
          --name textmerger `
          --paths textmerger `
          --add-data "textmerger/assets;assets" `
          --add-data "textmerger/translations;translations" `
          --hidden-import=PyQt5 `
          --hidden-import=PyQt5.QtCore `
          --hidden-import=PyQt5.QtGui `
          --hidden-import=PyQt5.QtWidgets `
          --collect-all PyQt5 `
          textmerger/__main__.py
    
    - name: Build with PyInstaller (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        pyinstaller --onefile --noconfirm \
          --name textmerger \
          --paths textmerger \
          --add-data "textmerger/assets:assets" \
          --add-data "textmerger/translations:translations" \
          --hidden-import=PyQt5 \
          --hidden-import=PyQt5.QtCore \
          --hidden-import=PyQt5.QtGui \
          --hidden-import=PyQt5.QtWidgets \
          --collect-all PyQt5 \
          textmerger/__main__.py

    - name: Package for Linux (DEB, RPM, AppImage)
      if: matrix.os == 'ubuntu-latest'
      run: |
        # Prepare directories
        mkdir -p dist/linux-packages
        
        # --- Prepare Staging Area for DEB/RPM ---
        mkdir -p build_root/usr/bin
        mkdir -p build_root/usr/share/applications
        mkdir -p build_root/usr/share/icons/hicolor/256x256/apps
        
        cp dist/textmerger build_root/usr/bin/
        cp packaging/textmerger.desktop build_root/usr/share/applications/
        cp textmerger/assets/logo/logo.png build_root/usr/share/icons/hicolor/256x256/apps/textmerger.png
        chmod +x build_root/usr/bin/textmerger
        
        # --- Build DEB ---
        fpm -s dir -t deb \
          -n textmerger \
          -v ${{ env.VERSION }} \
          -C build_root \
          -p dist/linux-packages/textmerger_${{ env.VERSION }}_amd64.deb \
          --description "A Python GUI application for merging text files" \
          --maintainer "pierspad" \
          --url "https://github.com/pierspad/TextMerger" \
          --license "MIT" \
          --category "utils" \
          --depends "libxcb1" \
          usr/
          
        # --- Build RPM ---
        fpm -s dir -t rpm \
          -n textmerger \
          -v ${{ env.VERSION }} \
          -C build_root \
          -p dist/linux-packages/textmerger-${{ env.VERSION }}-1.x86_64.rpm \
          --description "A Python GUI application for merging text files" \
          --maintainer "pierspad" \
          --url "https://github.com/pierspad/TextMerger" \
          --license "MIT" \
          --category "Utilities" \
          usr/

        # --- Build AppImage ---
        mkdir -p AppDir
        cp packaging/textmerger.desktop AppDir/
        cp textmerger/assets/logo/logo.png AppDir/textmerger.png
        mkdir -p AppDir/usr/bin
        cp dist/textmerger AppDir/usr/bin/textmerger
        
        # Create AppRun
        echo '#!/bin/sh' > AppDir/AppRun
        echo 'exec "$APPDIR/usr/bin/textmerger" "$@"' >> AppDir/AppRun
        chmod +x AppDir/AppRun
        
        # Download AppImageTool
        wget -O appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
        chmod +x appimagetool
        
        # Run AppImageTool
        # Use --appimage-extract-and-run to run appimagetool itself if FUSE is missing
        ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir dist/linux-packages/textmerger-${{ env.VERSION }}-x86_64.AppImage

    - name: Prepare Artifacts (Windows)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        mkdir -p dist/windows-packages
        mv dist/textmerger.exe dist/windows-packages/textmerger-${{ env.VERSION }}-windows.exe
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: packages-${{ matrix.os }}
        path: |
          dist/linux-packages/*
          dist/windows-packages/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Display structure of downloaded files
      run: ls -R artifacts
    
    - name: Prepare release files
      run: |
        mkdir -p release
        find artifacts -type f -exec cp {} release/ \;
        ls -la release/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: release/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

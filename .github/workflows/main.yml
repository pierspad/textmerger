name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install package + deps from pyproject
      run: |
        python -m pip install --upgrade pip
        # Installa il pacchetto definito in textmerger/ (inclusi gli optional se vuoi)
        pip install "./textmerger[all]"
        pip install pyinstaller

    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --onefile --windowed --noconfirm ^
          --name textmerger ^
          --add-data "textmerger\\assets;assets" ^
          --add-data "textmerger\\translations;translations" ^
          textmerger\\__main__.py

    - name: Build with PyInstaller (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        pyinstaller --onefile --noconfirm \
          --name textmerger \
          --add-data "textmerger/assets:assets" \
          --add-data "textmerger/translations:translations" \
          textmerger/__main__.py

    - name: Rename executables
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          mv dist/textmerger.exe dist/textmerger-windows.exe
        else
          mv dist/textmerger dist/textmerger-linux
          chmod +x dist/textmerger-linux
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: textmerger-${{ matrix.os }}
        path: dist/textmerger-*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: textmerger-*
        path: dist
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
